<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบ</title>
    <style>
        .container { max-width: 600px; margin: auto; padding: 20px; font-family: sans-serif; }
        .question { margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #ccc; }
        button { background-color: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>ทำข้อสอบชุดที่ <span id="setNum"></span></h2>
    <div id="examContainer">
        <p>กำลังโหลดข้อสอบ...</p>
    </div>
    <button onclick="submitExam()">ส่งข้อสอบ</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
    const supabaseUrl = 'https://wzwyotzzxycqfwercakh.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6d3lvdHp6eHljcWZ3ZXJjYWtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwNTg3MTMsImV4cCI6MjA3MjYzNDcxM30.lgiAf9oBUqsaWGb3u_80wuoKAODQHE_lIBxpGumhrno'; 
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    
    // ดึงและแสดงผลเลขชุดข้อสอบ
    const setIdRaw = sessionStorage.getItem('setId');
    document.getElementById('setNum').innerText = setIdRaw || "ไม่ระบุ";

        async function loadQuestions() {
        const container = document.getElementById('examContainer');
        const setId = sessionStorage.getItem('setId');
        
        console.log("กำลังดึงข้อสอบชุดที่:", setId);
        
        // 1. ดึงข้อมูลทั้งหมดในตาราง questions ออกมา (ไม่ต้องกรองที่ Supabase)
        const { data, error } = await _supabase
            .from('questions')
            .select('*'); 
            
        if (error) {
            container.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
            return;
        }

        // 2. ใช้ JavaScript กรองข้อมูลเอง เพื่อแก้ปัญหาเรื่องชนิดข้อมูลไม่ตรงกัน
        // เราใช้ .toString().trim() เพื่อให้แน่ใจว่าไม่มีช่องว่างและเป็นข้อความเหมือนกัน
        const filteredData = data.filter(q => String(q.set_id).trim() === String(setId).trim());

        console.log("ข้อมูลที่กรองได้:", filteredData);

        if (filteredData && filteredData.length > 0) {
            container.innerHTML = '';
            filteredData.forEach((q, index) => {
                container.innerHTML += `
                    <div class="question">
                        <p>${index + 1}. ${q.question_text}</p>
                        <input type="radio" name="q${q.id}" value="A"> ก. ${q.option_a}<br>
                        <input type="radio" name="q${q.id}" value="B"> ข. ${q.option_b}<br>
                        <input type="radio" name="q${q.id}" value="C"> ค. ${q.option_c}<br>
                        <input type="radio" name="q${q.id}" value="D"> ง. ${q.option_d}<br>
                    </div>
                `;
            });
        } else {
            container.innerHTML = `<p>ไม่พบข้อมูลชุดที่ ${setId} (ลองตรวจสอบใน Supabase ว่าช่อง set_id มีเลข 1 อยู่จริงไหม)</p>`;
        }
    }

    loadQuestions();

    function submitExam() {
        alert("ระบบบันทึกคำตอบแล้ว");
    }
</script>
</body>
</html>
