<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบทดสอบ</title>
    <style>
        .container { max-width: 600px; margin: auto; padding: 20px; font-family: sans-serif; }
        .question { margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #ccc; }
        button { background-color: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h2>ทำข้อสอบชุดที่ <span id="setNum"></span></h2>
    <div id="examContainer">กำลังโหลดข้อสอบ...</div>
    <button onclick="submitExam()">ส่งข้อสอบ</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
    const supabaseUrl = 'https://wzwyotzzxycqfwercakh.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6d3lvdHp6eHljcWZ3ZXJjYWtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwNTg3MTMsImV4cCI6MjA3MjYzNDcxM30.lgiAf9oBUqsaWGb3u_80wuoKAODQHE_lIBxpGumhrno'; 
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    
    const setId = sessionStorage.getItem('setId');
    document.getElementById('setNum').innerText = setId || "ไม่ระบุ";

    let questionsData = []; // เก็บข้อมูลข้อสอบไว้เพื่อตรวจคะแนน
    const startTime = new Date(); // บันทึกเวลาเริ่มทำข้อสอบ

    async function loadQuestions() {
        const container = document.getElementById('examContainer');
        
        const { data, error } = await _supabase
            .from('questions')
            .select('*')
            .eq('set_id', Number(setId));
            
        if (error) {
            container.innerHTML = "Error: " + error.message;
            return;
        }

        questionsData = data; // เก็บข้อมูลลงตัวแปร global

        if (data && data.length > 0) {
            container.innerHTML = '';
            data.forEach((q, index) => {
                container.innerHTML += `
                    <div class="question">
                        <p>${index + 1}. ${q.question_text}</p>
                        <input type="radio" name="q${q.id}" value="A"> ก. ${q.option_a}<br>
                        <input type="radio" name="q${q.id}" value="B"> ข. ${q.option_b}<br>
                        <input type="radio" name="q${q.id}" value="C"> ค. ${q.option_c}<br>
                        <input type="radio" name="q${q.id}" value="D"> ง. ${q.option_d}<br>
                    </div>
                `;
            });
        } else {
            container.innerHTML = "<p>ไม่พบข้อสอบในชุดนี้</p>";
        }
    }

<script>
    async function submitExam() {
        const userName = localStorage.getItem('userName');
        if (!userName) { alert("กรุณาล็อกอินใหม่"); window.location.href = 'index.html'; return; }

        const endTime = new Date();
        const durationMinutes = Math.round((endTime - startTime) / 60000);
        let score = 0;
        let answersSelected = {}; 

        questionsData.forEach(q => {
            const selected = document.querySelector(`input[name="q${q.id}"]:checked`);
            const val = selected ? selected.value : null;
            answersSelected[q.id] = val;
            if (val === q.correct_answer) score++;
        });

        const isPassed = score >= (questionsData.length * 0.7);

        const { error } = await _supabase.from('results').insert([{ 
            user_name: userName,
            set_id: setId,
            score: score,
            user_answers: answersSelected,
            is_passed: isPassed,
            duration_minutes: durationMinutes
        }]);

        if (error) { alert("บันทึกไม่สำเร็จ: " + error.message); } 
        else {
            window.location.href = `results_summary.html?score=${score}&total=${questionsData.length}&set=${setId}`;
        }
    }
</script>
</body>
</html>
