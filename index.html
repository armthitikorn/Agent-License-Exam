<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>ระบบสอบประกันชีวิต</h2>
    <input type="text" id="userName" placeholder="กรอกชื่อ-นามสกุล">
    <button onclick="saveUser()">เข้าสู่ระบบ</button>
</div>

<script>
    function saveUser() {
        const name = document.getElementById('userName').value;
        if (!name) { alert("กรุณากรอกชื่อครับ"); return; }
        localStorage.setItem('userName', name);
        window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
