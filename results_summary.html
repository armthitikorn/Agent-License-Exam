<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>สรุปผลคะแนน</title>
    <style>
        .container { max-width: 600px; margin: auto; padding: 20px; font-family: sans-serif; }
        .wrong { color: #dc3545; }
        .correct { color: #28a745; font-weight: bold; }
        .box { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h2>สรุปผลการสอบของคุณ <span id="displayName"></span></h2>
    <h3 id="scoreText"></h3>
    <div id="reviewContainer">กำลังโหลดเฉลย...</div>
    <button onclick="window.location.href='index.html'">กลับหน้าแรก</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
    const supabaseUrl = 'https://wzwyotzzxycqfwercakh.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6d3lvdHp6eHljcWZ3ZXJjYWtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwNTg3MTMsImV4cCI6MjA3MjYzNDcxM30.lgiAf9oBUqsaWGb3u_80wuoKAODQHE_lIBxpGumhrno'; 
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

   <script>
    // ดึงค่าจาก URL
    const params = new URLSearchParams(window.location.search);
    const score = params.get('score');
    const total = params.get('total');
    const setId = params.get('set');

    // แสดงคะแนน
    document.getElementById('displayName').innerText = localStorage.getItem('userName');
    document.getElementById('scoreText').innerText = `คุณได้คะแนน: ${score} / ${total}`;

async function showReview() {
    const container = document.getElementById('reviewContainer');
    const setId = params.get('set'); // ดึงค่า set จาก URL

    if (!setId) {
        container.innerHTML = "ไม่พบข้อมูลชุดข้อสอบ";
        return;
    }

    // ดึงข้อมูลข้อสอบของชุดนั้นๆ
    const { data, error } = await _supabase
        .from('questions')
        .select('*')
        .eq('set_id', setId); // ถ้า set_id ในตารางเป็น text ให้เอา Number() ออกครับ

    if (error) {
        container.innerHTML = "เกิดข้อผิดพลาดในการโหลดเฉลย: " + error.message;
        return;
    }

    if (!data || data.length === 0) {
        container.innerHTML = "ไม่พบข้อสอบในระบบ";
        return;
    }

    container.innerHTML = '';
    data.forEach((q, index) => {
        // ใช้ logic เลือกคำตอบที่ถูกต้องโดยตรง
        const correctKey = 'option_' + (q.correct_answer ? q.correct_answer.toLowerCase() : 'a');
        container.innerHTML += `
            <div class="box">
                <p><b>ข้อที่ ${index + 1}:</b> ${q.question_text}</p>
                <p class="correct">เฉลยที่ถูกต้อง: ${q[correctKey] || 'ไม่มีข้อมูล'}</p>
            </div>
        `;
    });
}
    showReview();
</script>
</body>
</html>
